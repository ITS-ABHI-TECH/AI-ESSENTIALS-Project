<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FinBot — Emergency Fund Planner</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080c14;--surface:#0f1520;--surface2:#161d2e;--surface3:#1c2540;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --accent:#4ade80;--cyan:#22d3ee;--purple:#a78bfa;--warn:#fbbf24;--red:#f87171;
  --text:#eef2ff;--muted:rgba(238,242,255,0.55);--muted2:rgba(238,242,255,0.28);
  --r:14px;--ff:'DM Sans',sans-serif;--fh:'Syne',sans-serif;
}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--ff);font-size:15px;line-height:1.6;display:flex;flex-direction:column}
#root{flex:1;display:flex;flex-direction:column;max-width:820px;width:100%;margin:0 auto}

/* ── HEADER ── */
.header{padding:1.25rem 1.5rem 0;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);padding-bottom:1rem}
.header-logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--cyan));display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-weight:800;font-size:16px;color:#050e06;flex-shrink:0}
.header-title{font-family:var(--fh);font-weight:800;font-size:17px}
.header-sub{font-size:12px;color:var(--muted)}
.header-badge{margin-left:auto;display:flex;align-items:center;gap:6px;background:rgba(74,222,128,0.08);border:1px solid rgba(74,222,128,0.2);border-radius:100px;padding:4px 12px;font-size:11px;color:var(--accent);font-weight:600;letter-spacing:0.06em;white-space:nowrap}
.online-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* ── CHAT AREA ── */
.chat-area{flex:1;overflow-y:auto;padding:1.5rem;display:flex;flex-direction:column;gap:1rem;scroll-behavior:smooth}
.chat-area::-webkit-scrollbar{width:4px}
.chat-area::-webkit-scrollbar-track{background:transparent}
.chat-area::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── MESSAGES ── */
.msg{display:flex;gap:10px;animation:slideIn 0.25s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse}
.avatar{width:32px;height:32px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;font-family:var(--fh)}
.avatar.bot{background:linear-gradient(135deg,var(--purple),var(--cyan));color:#fff}
.avatar.user{background:var(--surface3);border:1px solid var(--border2);color:var(--muted)}
.bubble{max-width:72%;padding:12px 16px;border-radius:18px;font-size:14px;line-height:1.7}
.bubble.bot{background:var(--surface2);border:1px solid var(--border);border-bottom-left-radius:4px;color:var(--text)}
.bubble.user{background:linear-gradient(135deg,rgba(74,222,128,0.18),rgba(34,211,238,0.12));border:1px solid rgba(74,222,128,0.2);border-bottom-right-radius:4px;color:var(--text)}
.bubble.typing{background:var(--surface2);border:1px solid var(--border);border-bottom-left-radius:4px;padding:14px 18px}

/* ── TYPING DOTS ── */
.dots{display:flex;gap:5px;align-items:center}
.dots span{width:7px;height:7px;border-radius:50%;background:var(--purple);opacity:0.4;animation:bounce 1.2s ease-in-out infinite}
.dots span:nth-child(2){animation-delay:0.2s}
.dots span:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:0.4}40%{transform:translateY(-5px);opacity:1}}

/* ── RESULTS CARD inside bubble ── */
.result-card{margin-top:12px;background:var(--surface3);border:1px solid var(--border2);border-radius:12px;padding:14px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
@media(max-width:520px){.result-card{grid-template-columns:1fr 1fr}}
.rc-item .rc-label{font-size:10px;color:var(--muted2);letter-spacing:0.07em;text-transform:uppercase;font-weight:500}
.rc-item .rc-val{font-family:var(--fh);font-weight:700;font-size:1.1rem;margin-top:1px}
.rc-val.green{color:var(--accent)}.rc-val.cyan{color:var(--cyan)}.rc-val.purple{color:var(--purple)}.rc-val.red{color:var(--red)}.rc-val.warn{color:var(--warn)}

/* ── PROGRESS BAR in card ── */
.prog-wrap{grid-column:1/-1;margin-top:4px}
.prog-label{display:flex;justify-content:space-between;font-size:11px;color:var(--muted2);margin-bottom:5px}
.prog-bg{background:var(--surface);border-radius:100px;height:8px;overflow:hidden}
.prog-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--cyan),var(--accent));transition:width 1.2s cubic-bezier(.4,0,.2,1)}

/* ── CHART ── */
.chart-bubble{max-width:90%;margin-left:42px}
.chart-wrap{position:relative;height:180px;margin-top:8px}

/* ── QUICK REPLIES ── */
.quick-replies{display:flex;flex-wrap:wrap;gap:8px;padding:0 1.5rem 0.75rem}
.qr{background:var(--surface2);border:1px solid var(--border2);border-radius:100px;padding:6px 14px;font-size:12px;color:var(--muted);cursor:pointer;transition:all 0.15s;font-family:var(--ff)}
.qr:hover{border-color:var(--cyan);color:var(--cyan);background:rgba(34,211,238,0.06)}

/* ── INPUT BAR ── */
.input-bar{padding:1rem 1.5rem 1.5rem;border-top:1px solid var(--border)}
.input-row{display:flex;gap:10px;align-items:flex-end;background:var(--surface2);border:1px solid var(--border2);border-radius:16px;padding:10px 12px;transition:border-color 0.2s}
.input-row:focus-within{border-color:var(--cyan)}
.chat-input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:var(--ff);font-size:14px;resize:none;max-height:120px;line-height:1.5;padding:2px 0}
.chat-input::placeholder{color:var(--muted2)}
.send-btn{width:36px;height:36px;border-radius:10px;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity 0.15s,transform 0.1s}
.send-btn:hover{opacity:0.85}
.send-btn:active{transform:scale(0.95)}
.send-btn:disabled{opacity:0.35;cursor:not-allowed}
.send-icon{width:16px;height:16px;fill:none;stroke:#050e06;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}

/* ── RESET BTN ── */
.reset-btn{background:none;border:none;color:var(--muted2);font-size:12px;cursor:pointer;padding:0;font-family:var(--ff);transition:color 0.15s;margin-left:auto}
.reset-btn:hover{color:var(--red)}

/* ── WELCOME ── */
.welcome{text-align:center;padding:3rem 1rem 1rem}
.welcome h2{font-family:var(--fh);font-size:1.6rem;font-weight:800;background:linear-gradient(135deg,#fff 20%,var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:0.5rem}
.welcome p{color:var(--muted);font-size:14px;max-width:380px;margin:0 auto 1.5rem}
.welcome-chips{display:flex;flex-wrap:wrap;justify-content:center;gap:8px}
.chip{background:var(--surface2);border:1px solid var(--border2);border-radius:100px;padding:7px 16px;font-size:13px;color:var(--muted);cursor:pointer;transition:all 0.15s}
.chip:hover{border-color:var(--purple);color:var(--purple)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

// ── CONFIG ──────────────────────────────────────────────────
// Set to false and run python app.py for real AI responses
const USE_DEMO = true;
const API_URL  = "http://localhost:5000/chat";

// ── DEMO BOT (no backend needed) ───────────────────────────
const DEMO_STEPS = [
  "Hi! I'm **FinBot** 👋 I help you figure out exactly how much you need in your emergency fund and build a personalised plan to get there.\n\nLet's start simple — what's your **monthly income** after tax?",
  "Got it! And what are your total **monthly expenses**? Include everything — rent, food, bills, subscriptions, transport.",
  "Thanks. How much do you currently have in **savings** right now? Even if it's zero, that's totally fine.",
  "Almost done! How much are you able to **set aside each month** going forward for savings?",
  "Last question — which best describes your **work situation**?\n\n• **Stable** — salaried, government, or permanent role\n• **Unstable** — contract, part-time, or variable income\n• **Freelancer** — self-employed, gig work, or consulting",
  null
];

// ── INPUT VALIDATION (mirrors backend ranges) ───────────────
const VALID_RANGES = {
  monthly_income:   [100,    500000],
  monthly_expenses: [50,     400000],
  current_savings:  [0,    10000000],
  monthly_saving:   [0,      200000],
};
const VALID_MSGS = {
  monthly_income:   "That income figure looks outside the expected range ($100–$500,000/month). Could you double-check?",
  monthly_expenses: "Those expenses seem off ($50–$400,000/month is the expected range). Want to re-enter?",
  current_savings:  "That savings amount seems unusual. Could you confirm the figure?",
  monthly_saving:   "That monthly saving amount looks off ($0–$200,000/month). Can you re-enter?",
};

function validateField(key, value) {
  const [lo, hi] = VALID_RANGES[key];
  if (value < lo || value > hi) return VALID_MSGS[key];
  return null;
}

let demoStep = 0;
const demoData = {};
const demoKeys = ['monthly_income','monthly_expenses','current_savings','monthly_saving','job_type'];

function parseDemoInput(text, step) {
  if (step < 4) {
    const num = parseFloat(text.replace(/[^0-9.]/g,''));
    demoData[demoKeys[step]] = isNaN(num) ? 0 : num;
  } else {
    const t = text.toLowerCase();
    demoData.job_type = t.includes('free') ? 'freelancer' : t.includes('un') ? 'unstable' : 'stable';
  }
}

function runDemoCalc() {
  const { monthly_income:inc=5000, monthly_expenses:exp=3000, current_savings:sav=8000, monthly_saving:ms=500, job_type:jt='stable' } = demoData;
  const months = {stable:3,unstable:6,freelancer:9}[jt];
  const target = +(exp * months * 1.03).toFixed(2);
  const gap    = Math.max(0, +(target - sav).toFixed(2));
  const mog    = ms > 0 ? +(gap/ms).toFixed(1) : null;
  const sr     = inc > 0 ? +((ms/inc)*100).toFixed(1) : 0;
  return { recommended_months:months, recommended_fund:target, inflation_rate:3.0,
    current_savings:sav, gap, months_to_goal:mog, savings_rate_pct:sr,
    job_type:jt, monthly_expenses:exp, monthly_income:inc, monthly_saving:ms };
}

function demoReply(calcResult) {
  const { recommended_fund:tf, gap, months_to_goal:mtg, savings_rate_pct:sr, recommended_months:rm, job_type:jt } = calcResult;
  const fmt = n => n?.toLocaleString('en-US',{maximumFractionDigits:0});
  const tips = {
    stable:    ["Build your fund in a high-yield savings account separate from your main account.", "Set up an automatic transfer on payday so saving happens before spending.", "Review your subscriptions — cancelling just 2-3 unused ones could add $50-100/month to savings."],
    unstable:  ["Save aggressively during high-income months to compensate for lean periods.", "Keep your emergency fund in a liquid money market account for easy access.", "Track income volatility over 6 months to understand your true average monthly income."],
    freelancer:["Open a dedicated emergency fund account and treat it as a non-negotiable business expense.", "Set aside 20-30% of every payment you receive directly into savings before spending any of it.", "Build your fund to 9 months because client work can dry up unexpectedly — don't shortcut this."],
  }[jt];
  return `Here's your personalised emergency fund plan! 🎉\n\nYour target emergency fund is **$${fmt(tf)}** — that's ${rm} months of expenses, adjusted for inflation. You currently have a gap of **$${fmt(gap)}** to fill.\n\n${mtg ? `At your current savings pace, you'll reach your goal in **${mtg} months** (about ${(mtg/12).toFixed(1)} years).` : "You'll need to increase your monthly saving to reach your goal — even a small increase makes a big difference."} Your savings rate is **${sr}%** of your income${sr >= 20 ? ' — excellent work!' : sr >= 10 ? ' — solid, but you can push further.' : ' — try to get this above 10% as a priority.'}\n\n**3 tips for you:**\n1. ${tips[0]}\n2. ${tips[1]}\n3. ${tips[2]}\n\nFeel free to ask me anything else — like "what if I save $200 more per month?" or "how do I cut my expenses?"`;
}

// ── CHART COMPONENT ─────────────────────────────────────────
function MiniChart({ data }) {
  const ref = useRef(null);
  const inst = useRef(null);
  useEffect(() => {
    if (!data || !ref.current) return;
    if (inst.current) inst.current.destroy();
    const months = data.months_to_goal || 12;
    const labels = [], saved = [], goal = [];
    for (let i = 0; i <= Math.min(Math.ceil(months) + 3, 30); i++) {
      labels.push(i === 0 ? 'Now' : `Mo ${i}`);
      saved.push(+(Math.min(data.current_savings + i * data.monthly_saving, data.recommended_fund)).toFixed(0));
      goal.push(data.recommended_fund);
    }
    inst.current = new Chart(ref.current, {
      type: 'line',
      data: {
        labels,
        datasets: [
          { label:'Savings', data:saved, borderColor:'#4ade80', backgroundColor:'rgba(74,222,128,0.07)', fill:true, tension:0.4, pointRadius:0, borderWidth:2 },
          { label:'Goal',    data:goal,  borderColor:'rgba(34,211,238,0.45)', borderDash:[5,4], pointRadius:0, borderWidth:1.5, fill:false }
        ]
      },
      options: {
        responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{display:false}, tooltip:{ backgroundColor:'#161d2e', titleColor:'#eef2ff', bodyColor:'#8899bb', borderColor:'rgba(255,255,255,0.1)', borderWidth:1, callbacks:{ label: c => ` $${Math.round(c.parsed.y).toLocaleString()}` } } },
        scales:{
          x:{ ticks:{ color:'#3a4460', font:{size:9}, maxRotation:0, autoSkip:true, maxTicksLimit:6 }, grid:{ color:'rgba(255,255,255,0.03)' } },
          y:{ ticks:{ color:'#3a4460', font:{size:9}, callback: v=>'$'+(v/1000).toFixed(0)+'k' }, grid:{ color:'rgba(255,255,255,0.04)' } }
        }
      }
    });
    return () => { if(inst.current) inst.current.destroy(); };
  }, [data]);
  return <div className="chart-wrap"><canvas ref={ref} /></div>;
}

// ── RESULT CARD COMPONENT ───────────────────────────────────
function ResultCard({ data }) {
  const fmt = n => n?.toLocaleString('en-US',{maximumFractionDigits:0}) ?? '—';
  const pct = Math.min(100, Math.round((data.current_savings / data.recommended_fund) * 100));
  return (
    <div className="result-card">
      <div className="rc-item"><div className="rc-label">Target Fund</div><div className="rc-val cyan">${fmt(data.recommended_fund)}</div></div>
      <div className="rc-item"><div className="rc-label">Gap</div><div className={`rc-val ${data.gap===0?'green':'red'}`}>${fmt(data.gap)}</div></div>
      <div className="rc-item"><div className="rc-label">Time to Goal</div><div className="rc-val purple">{data.months_to_goal!=null?data.months_to_goal+' mo':'—'}</div></div>
      <div className="rc-item"><div className="rc-label">Savings Rate</div><div className={`rc-val ${data.savings_rate_pct>=20?'green':data.savings_rate_pct>=10?'cyan':'red'}`}>{data.savings_rate_pct}%</div></div>
      <div className="rc-item"><div className="rc-label">Inflation</div><div className="rc-val warn">{data.inflation_rate}%</div></div>
      <div className="rc-item"><div className="rc-label">Buffer</div><div className="rc-val green">{data.recommended_months} months</div></div>
      <div className="prog-wrap">
        <div className="prog-label"><span>Progress</span><span>{pct}% of goal</span></div>
        <div className="prog-bg"><div className="prog-fill" style={{width:pct+'%'}} /></div>
      </div>
    </div>
  );
}

// ── RENDER MESSAGE ──────────────────────────────────────────
function renderText(text) {
  // Bold **text** and newlines
  return text.split('\n').map((line, i) => {
    const parts = line.split(/\*\*(.+?)\*\*/g);
    return (
      <span key={i}>
        {parts.map((p, j) => j % 2 === 1 ? <strong key={j}>{p}</strong> : p)}
        {i < text.split('\n').length - 1 && <br />}
      </span>
    );
  });
}

// ── QUICK REPLY SETS ────────────────────────────────────────
const QUICK_SETS = {
  start: ["Get started", "How does this work?", "Why do I need an emergency fund?"],
  after: ["What if I save $200 more/month?", "How can I cut my expenses?", "What's a high-yield savings account?", "Start over"],
};

// ── MAIN APP ────────────────────────────────────────────────
function App() {
  const [messages, setMessages]   = useState([]); // {role, content, calcResult?}
  const [input, setInput]         = useState('');
  const [loading, setLoading]     = useState(false);
  const [calcDone, setCalcDone]   = useState(false);
  const [lastCalc, setLastCalc]   = useState(null);
  const bottomRef = useRef(null);
  const inputRef  = useRef(null);

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior:'smooth' }); }, [messages, loading]);

  const addMsg = (role, content, calcResult=null) =>
    setMessages(prev => [...prev, { role, content, calcResult }]);

  const reset = () => {
    setMessages([]); setInput(''); setCalcDone(false); setLastCalc(null);
    demoStep = 0; Object.keys(demoData).forEach(k => delete demoData[k]);
  };

  const send = async (text) => {
    const txt = (text || input).trim();
    if (!txt || loading) return;
    setInput('');
    addMsg('user', txt);
    setLoading(true);

    if (USE_DEMO) {
      await new Promise(r => setTimeout(r, 700 + Math.random() * 500));

      if (demoStep > 0 && demoStep <= 4) {
        // Parse the input for the previous question
        parseDemoInput(txt, demoStep - 1);

        // Validate numeric fields (steps 1–4 = fields 0–3)
        if (demoStep <= 4) {
          const key = demoKeys[demoStep - 1];
          if (key !== 'job_type') {
            const valErr = validateField(key, demoData[key]);
            if (valErr) {
              addMsg('assistant', valErr);
              // Don't advance step — let them re-enter
              demoStep--;
              setLoading(false);
              return;
            }
          }
        }
      }

      if (demoStep < 5) {
        addMsg('assistant', DEMO_STEPS[demoStep]);
        demoStep++;
      } else if (demoStep === 5) {
        parseDemoInput(txt, 4); // parse job type
        // Extra sanity check: expenses vs income
        const inc = demoData.monthly_income || 0;
        const exp = demoData.monthly_expenses || 0;
        if (exp > inc * 1.5 && inc > 0) {
          addMsg('assistant', "Just want to double-check — your expenses seem much higher than your income. Could you confirm both figures are correct?");
          demoStep = 2; // rewind to re-ask expenses
          setLoading(false);
          return;
        }
        const calc = runDemoCalc();
        setLastCalc(calc);
        setCalcDone(true);
        addMsg('assistant', demoReply(calc), calc);
        demoStep++;
      } else {
        // Follow-up questions
        const t = txt.toLowerCase();
        let reply = "That's a great question! ";
        if (t.includes('more') || t.includes('save more')) {
          const extra = 200;
          const newGap = lastCalc ? Math.max(0, lastCalc.gap - extra) : 0;
          const newMtg = lastCalc && (lastCalc.monthly_saving + extra) > 0 ? +(newGap / (lastCalc.monthly_saving + extra)).toFixed(1) : null;
          reply = `If you saved $${extra} more per month, your new gap would be **$${newGap.toLocaleString()}** and you'd reach your goal in about **${newMtg} months** instead — that's a meaningful difference! Even small increases compound quickly over time.`;
        } else if (t.includes('cut') || t.includes('expens')) {
          reply = "The fastest ways to cut expenses are: **1)** cancel unused subscriptions (check your bank statement for recurring charges), **2)** meal prep instead of eating out — this alone can save $200-400/month, and **3)** renegotiate bills like internet, phone, or insurance annually. Would you like a more detailed breakdown?";
        } else if (t.includes('high-yield') || t.includes('hysa') || t.includes('savings account')) {
          reply = "A **high-yield savings account (HYSA)** pays significantly more interest than a regular savings account — often 4-5% APY vs 0.01%. Great options include Marcus by Goldman Sachs, Ally Bank, and SoFi. Your emergency fund should always sit in one of these — it's safe, liquid, and grows while you're not touching it.";
        } else if (t.includes('start over') || t.includes('restart') || t.includes('reset')) {
          reset(); setLoading(false); return;
        } else if (t.includes('how does') || t.includes('how do') || t.includes('work')) {
          reply = "Simple! I'll ask you 5 quick questions about your income, expenses, savings, and work situation. Then I'll calculate your exact emergency fund target — adjusted for inflation — and show you a month-by-month plan to get there. Ready to start?";
        } else if (t.includes('why') || t.includes('need') || t.includes('emergency fund')) {
          reply = "An emergency fund is 3–9 months of living expenses kept in a liquid savings account. It's your buffer against job loss, medical bills, or unexpected repairs. Without one, most people end up taking on high-interest debt when life happens — which sets them back for years. It's the single most important financial step before any investing.";
        } else if (t.includes('get started') || t.includes('start')) {
          addMsg('assistant', DEMO_STEPS[0]);
          demoStep = 1;
          setLoading(false);
          return;
        } else {
          reply = "Good question! The most important principle is: **pay yourself first**. Automate your savings on payday, keep your emergency fund in a separate account, and review your progress monthly. Anything specific about your plan you'd like to explore?";
        }
        addMsg('assistant', reply);
      }
      setLoading(false);
      return;
    }

    // ── REAL BACKEND ──────────────────────────────────────
    try {
      const history = [...messages, { role:'user', content:txt }]
        .map(m => ({ role: m.role, content: m.content }));

      const res  = await fetch(API_URL, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ messages: history })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);

      if (data.calc_result) { setLastCalc(data.calc_result); setCalcDone(true); }
      addMsg('assistant', data.reply, data.calc_result || null);
    } catch(e) {
      addMsg('assistant', '❌ Could not reach the server. Make sure `python app.py` is running on port 5000.');
    }
    setLoading(false);
  };

  const onKey = e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  };

  const showWelcome  = messages.length === 0;
  const quickSet     = calcDone ? QUICK_SETS.after : (messages.length === 0 ? QUICK_SETS.start : []);

  return (
    <>
      {/* HEADER */}
      <div className="header">
        <div className="header-logo">F</div>
        <div>
          <div className="header-title">FinBot</div>
          <div className="header-sub">Emergency Fund Planner</div>
        </div>
        <div className="header-badge">
          <div className="online-dot" />
          Online
        </div>
        {messages.length > 0 && (
          <button className="reset-btn" onClick={reset} style={{marginLeft:'12px'}}>New chat</button>
        )}
      </div>

      {/* CHAT MESSAGES */}
      <div className="chat-area">
        {showWelcome && (
          <div className="welcome">
            <h2>Build Your Financial Safety Net</h2>
            <p>Answer a few quick questions and I'll calculate your emergency fund target, show your gap, and give you a personalised plan.</p>
            <div className="welcome-chips">
              {QUICK_SETS.start.map(q => (
                <button key={q} className="chip" onClick={() => send(q)}>{q}</button>
              ))}
            </div>
          </div>
        )}

        {messages.map((msg, i) => (
          <div key={i}>
            <div className={`msg ${msg.role}`}>
              <div className={`avatar ${msg.role === 'assistant' ? 'bot' : 'user'}`}>
                {msg.role === 'assistant' ? 'F' : 'U'}
              </div>
              <div className={`bubble ${msg.role === 'assistant' ? 'bot' : 'user'}`}>
                {renderText(msg.content)}
                {msg.calcResult && <ResultCard data={msg.calcResult} />}
              </div>
            </div>
            {/* Chart shown below the calc result message */}
            {msg.calcResult && (
              <div className="msg" style={{marginTop:'-4px'}}>
                <div style={{width:32,flexShrink:0}} />
                <div className="bubble bot chart-bubble" style={{maxWidth:'85%',width:'100%'}}>
                  <div style={{fontSize:11,color:'var(--muted2)',marginBottom:4,display:'flex',gap:12}}>
                    <span style={{display:'flex',alignItems:'center',gap:4}}><span style={{width:8,height:8,borderRadius:2,background:'#4ade80',display:'inline-block'}}/>Savings</span>
                    <span style={{display:'flex',alignItems:'center',gap:4}}><span style={{width:8,height:8,borderRadius:2,background:'rgba(34,211,238,0.5)',display:'inline-block'}}/>Goal</span>
                  </div>
                  <MiniChart data={msg.calcResult} />
                </div>
              </div>
            )}
          </div>
        ))}

        {loading && (
          <div className="msg">
            <div className="avatar bot">F</div>
            <div className="bubble typing"><div className="dots"><span/><span/><span/></div></div>
          </div>
        )}

        <div ref={bottomRef} />
      </div>

      {/* QUICK REPLIES */}
      {quickSet.length > 0 && !loading && (
        <div className="quick-replies">
          {quickSet.map(q => (
            <button key={q} className="qr" onClick={() => send(q)}>{q}</button>
          ))}
        </div>
      )}

      {/* INPUT BAR */}
      <div className="input-bar">
        <div className="input-row">
          <textarea
            ref={inputRef}
            className="chat-input"
            placeholder="Type a message…"
            rows={1}
            value={input}
            onChange={e => setInput(e.target.value)}
            onKeyDown={onKey}
          />
          <button className="send-btn" onClick={() => send()} disabled={!input.trim() || loading}>
            <svg className="send-icon" viewBox="0 0 24 24">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
